<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Black Ink Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050505;--bg2:#0d0d0d;--bg3:#131313;--bg4:#1a1a1a;
  --card:rgba(13,13,13,0.95);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.04);
  --border-o:rgba(255,140,0,0.35);
  --o1:#FF8C00;--o2:#FF6B00;--o3:#FFB347;
  --og1:rgba(255,140,0,0.15);--og2:rgba(255,140,0,0.08);--og3:rgba(255,140,0,0.04);
  --t1:#F2EDE8;--t2:#A8A09A;--t3:#5C5550;--t4:#2E2B28;
  --red:#FF3B3B;--green:#00CC88;--blue:#0099FF;
  --f1:'Montserrat',sans-serif;--f2:'Inter',sans-serif;--f3:'JetBrains Mono',monospace;
  --sh:0 4px 28px rgba(0,0,0,0.7);--ease:cubic-bezier(0.16,1,0.3,1);
}
[data-theme="light"]{
  --bg:#F7F4F0;--bg2:#EEE9E3;--bg3:#E5DFD8;--bg4:#DDD6CE;
  --card:rgba(255,252,248,0.96);--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.04);
  --t1:#1A1714;--t2:#5C5450;--t3:#9A958F;--t4:#C8C3BC;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--f2);-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,140,0,.3);border-radius:2px}
::selection{background:rgba(255,140,0,.2)}
input:-webkit-autofill,input:-webkit-autofill:focus{-webkit-box-shadow:0 0 0 1000px var(--bg2) inset;-webkit-text-fill-color:var(--t1)}

/* SPLASH */
#splash{position:fixed;inset:0;background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;overflow:hidden;transition:opacity .8s,visibility .8s}
#splash.out{opacity:0;visibility:hidden;pointer-events:none}
#sp-glow{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(255,140,0,.1) 0%,transparent 70%);animation:glowP 3s ease-in-out infinite}
@keyframes glowP{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.2);opacity:1}}
.sp-ring{position:absolute;border-radius:50%;border:1px solid transparent;animation:spinR var(--d,2s) linear infinite var(--dir,normal)}
.sr1{width:160px;height:160px;border-top-color:#FF8C00;border-right-color:rgba(255,140,0,.15);--d:1.8s}
.sr2{width:205px;height:205px;border-bottom-color:#FF6B00;border-left-color:rgba(255,107,0,.1);--d:3s;--dir:reverse}
.sr3{width:258px;height:258px;border-top-color:rgba(255,140,0,.06);--d:4.5s}
@keyframes spinR{to{transform:rotate(360deg)}}
#sp-logo{position:relative;z-index:1;text-align:center;animation:logoIn .9s .2s cubic-bezier(.16,1,.3,1) both}
@keyframes logoIn{from{opacity:0;transform:translateY(22px) scale(.95)}to{opacity:1;transform:none}}
#sp-wm{font-family:var(--f1);font-size:clamp(2rem,6vw,3rem);font-weight:900;letter-spacing:10px;color:#fff;text-shadow:0 0 60px rgba(255,140,0,.35)}
#sp-sub{font-size:.5rem;letter-spacing:10px;color:#FF8C00;margin-top:.3rem;font-weight:600;opacity:0;animation:fi .6s 1s ease forwards}
#sp-line{width:0;height:1px;background:linear-gradient(90deg,transparent,#FF8C00,#FF6B00,transparent);margin:.8rem auto;animation:lineW .8s .5s ease forwards}
@keyframes lineW{to{width:80px;opacity:1}}@keyframes fi{to{opacity:1}}
#sp-tag{font-size:.48rem;letter-spacing:4px;color:#333;opacity:0;animation:fi .6s 1.2s ease forwards}
#sp-prog{position:absolute;bottom:80px;width:230px;display:flex;flex-direction:column;align-items:center;gap:.65rem;opacity:0;animation:fi .5s .6s ease forwards}
#sp-track{width:100%;height:1px;background:#111;overflow:hidden}
#sp-fill{height:100%;width:0%;background:linear-gradient(90deg,#FF8C00,#FF4500);transition:width .1s linear}
#sp-status{font-size:.5rem;letter-spacing:3px;color:#2a2a2a}
#sp-copy{position:absolute;bottom:1.75rem;font-size:.45rem;letter-spacing:3px;color:#1a1a1a;opacity:0;animation:fi .5s 1.4s ease forwards}
.sp-corner{position:absolute;width:22px;height:22px;opacity:0;animation:fi .5s 1s ease forwards}
.sc-tl{top:1.5rem;left:1.5rem;border-top:1px solid rgba(255,140,0,.2);border-left:1px solid rgba(255,140,0,.2)}
.sc-tr{top:1.5rem;right:1.5rem;border-top:1px solid rgba(255,140,0,.2);border-right:1px solid rgba(255,140,0,.2)}
.sc-bl{bottom:1.5rem;left:1.5rem;border-bottom:1px solid rgba(255,140,0,.1);border-left:1px solid rgba(255,140,0,.1)}
.sc-br{bottom:1.5rem;right:1.5rem;border-bottom:1px solid rgba(255,140,0,.1);border-right:1px solid rgba(255,140,0,.1)}

/* APP GLOBAL */
.navbar{position:sticky;top:0;z-index:200;background:rgba(5,5,5,.96);backdrop-filter:blur(28px);border-bottom:1px solid var(--border);height:58px}
[data-theme="light"] .navbar{background:rgba(247,244,240,.96)}
.nb-inner{max-width:1200px;margin:0 auto;padding:0 1.25rem;height:100%;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.nb-brand{display:flex;align-items:baseline;gap:.4rem;cursor:pointer;flex-shrink:0}
.nb-wm{font-family:var(--f1);font-size:1.1rem;font-weight:900;letter-spacing:3px;color:var(--t1)}
.nb-gl{font-size:.42rem;letter-spacing:5px;color:var(--o1);font-weight:700}
.nb-search{flex:1;max-width:300px;position:relative}
.nb-si{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--t3);font-size:.82rem;pointer-events:none}
.nb-inp{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:.44rem 1rem .44rem 2.1rem;color:var(--t1);font-size:.82rem;outline:none;transition:border-color .15s}
.nb-inp:focus{border-color:var(--border-o)}
.nb-tabs{display:flex;gap:.1rem}
.tab{background:transparent;border:1px solid transparent;color:var(--t3);padding:.35rem .7rem;border-radius:6px;font-size:.62rem;letter-spacing:1px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--f2)}
.tab:hover{color:var(--t2);background:var(--og3)}
.tab.on{color:var(--o1);background:var(--og3);border-color:rgba(255,140,0,.18)}
.nb-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.nb-notif{position:relative}
.nb-badge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;background:var(--o1);color:#050505;border-radius:50%;font-size:.5rem;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
.admin-chip{font-size:.5rem;color:var(--o1);border:1px solid rgba(255,140,0,.3);padding:.18rem .5rem;border-radius:3px;letter-spacing:2px;font-weight:700}

/* LAYOUT */
.layout{max-width:1200px;margin:0 auto;padding:1.25rem;display:grid;grid-template-columns:235px 1fr 275px;gap:1.25rem}
@media(max-width:1024px){.layout{grid-template-columns:1fr}.sl,.sr{display:none}}
@media(max-width:680px){.layout{padding:.6rem}.nb-tabs,.nb-search{display:none}}
.sidebar{position:sticky;top:70px;height:fit-content;max-height:calc(100vh - 80px);overflow-y:auto;display:flex;flex-direction:column;gap:.75rem}
.scard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;backdrop-filter:blur(16px)}
.slbl{font-size:.55rem;letter-spacing:3px;color:var(--t4);margin-bottom:.85rem;font-weight:700}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;position:relative}
.auth-orb{position:fixed;top:25%;left:50%;transform:translateX(-50%);width:500px;height:350px;background:radial-gradient(ellipse,rgba(255,140,0,.06) 0%,transparent 70%);pointer-events:none}
.auth-card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.75rem 2.5rem;box-shadow:var(--sh);backdrop-filter:blur(24px);animation:authIn .65s var(--ease) both}
@keyframes authIn{from{opacity:0;transform:translateY(26px) scale(.97)}to{opacity:1;transform:none}}
.auth-wm{font-family:var(--f1);font-size:1.9rem;font-weight:900;letter-spacing:5px;color:var(--t1)}
.auth-sub{font-size:.5rem;letter-spacing:8px;color:var(--o1);font-weight:600;margin-top:.25rem}
.auth-rule{height:1px;background:linear-gradient(90deg,transparent,var(--o1),var(--o2),transparent);margin:1.25rem 0;width:0;animation:ruleG .8s .4s ease forwards}
@keyframes ruleG{to{width:100%;opacity:1}}
.auth-lbl{font-size:.6rem;letter-spacing:3px;color:var(--t3);text-align:center;margin-bottom:1.5rem;font-weight:600}
.field{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.85rem 1.1rem;color:var(--t1);font-size:.9rem;outline:none;transition:border-color .15s,box-shadow .15s;margin-bottom:.85rem;font-family:var(--f2)}
.field:focus{border-color:var(--border-o);box-shadow:0 0 0 3px rgba(255,140,0,.08)}
.field::placeholder{color:var(--t3)}
.auth-err{color:var(--red);font-size:.78rem;padding:.6rem .85rem;background:rgba(255,59,59,.05);border-radius:8px;border:1px solid rgba(255,59,59,.12);margin-bottom:.75rem;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;border:none;border-radius:10px;cursor:pointer;font-weight:600;transition:all .14s var(--ease);letter-spacing:.3px;font-family:var(--f2)}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--o1);color:#050505;padding:.75rem 1.5rem;font-size:.85rem;letter-spacing:1.5px;box-shadow:0 4px 24px rgba(255,140,0,.35)}
.btn-p:hover{background:var(--o2);box-shadow:0 6px 32px rgba(255,140,0,.5);transform:translateY(-1px)}
.btn-g{background:transparent;color:var(--t2);border:1px solid var(--border);padding:.65rem 1.3rem;font-size:.82rem}
.btn-g:hover{border-color:var(--border-o);color:var(--o1)}
.btn-d{background:rgba(255,59,59,.08);color:var(--red);border:1px solid rgba(255,59,59,.2);padding:.38rem .85rem;font-size:.7rem}
.btn-d:hover{background:rgba(255,59,59,.15)}
.btn-sm{padding:.32rem .75rem!important;font-size:.7rem!important;border-radius:7px!important}
.btn-fw{width:100%}
.icon-btn{padding:.44rem;background:transparent;border:none;color:var(--t2);font-size:1rem;border-radius:7px;cursor:pointer;transition:all .14s}
.icon-btn:hover{background:var(--og3);color:var(--o1)}

/* PROFILE WIDGET */
.pw-banner{height:55px;background:linear-gradient(135deg,rgba(255,140,0,.2),rgba(255,107,0,.05));border-radius:12px 12px 0 0}
.pw-body{padding:0 1rem 1rem}
.pw-avi{margin-top:-22px;margin-bottom:.5rem}
.pw-name{font-size:.95rem;font-weight:700;color:var(--t1)}
.pw-bio{font-size:.72rem;color:var(--t3);margin-top:2px;line-height:1.5}
.pw-stats{display:flex;gap:1.25rem;margin-top:.85rem;padding-top:.75rem;border-top:1px solid var(--border)}
.ps-v{font-family:var(--f1);font-size:1.05rem;font-weight:700;color:var(--o1)}
.ps-l{font-size:.55rem;letter-spacing:1px;color:var(--t4);font-weight:600}

/* NAV ITEMS */
.nav-item{display:flex;align-items:center;gap:.65rem;padding:.55rem .7rem;border-radius:10px;color:var(--t2);font-size:.88rem;cursor:pointer;transition:all .14s;background:transparent;border:none;width:100%;text-align:left;font-family:var(--f2);margin-bottom:.1rem}
.nav-item:hover{background:var(--og3);color:var(--t1)}
.nav-item.on{background:var(--og2);color:var(--o1);border:1px solid rgba(255,140,0,.15)}

/* STORIES */
.stories{display:flex;gap:.75rem;overflow-x:auto;padding:.2rem 0 .85rem;scrollbar-width:none;margin-bottom:1rem}
.stories::-webkit-scrollbar{display:none}
.story{display:flex;flex-direction:column;align-items:center;gap:.4rem;cursor:pointer;flex-shrink:0}
.story-ring{width:58px;height:58px;border-radius:50%;padding:2.5px;transition:transform .14s,box-shadow .14s}
.story-ring:hover{transform:scale(1.07);box-shadow:0 4px 20px rgba(255,140,0,.4)}
.story-ring.seen{background:var(--t4)!important}
.story-inner{width:100%;height:100%;border-radius:50%;background:var(--bg3);border:2.5px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:var(--o1)}
.story-name{font-size:.6rem;color:var(--t2);max-width:58px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* COMPOSER */
.composer{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin-bottom:1rem;backdrop-filter:blur(16px)}
.comp-ta{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.75rem .9rem;color:var(--t1);font-size:.88rem;min-height:78px;resize:none;outline:none;transition:border-color .15s;line-height:1.8;font-family:var(--f2)}
.comp-ta:focus{border-color:var(--border-o);box-shadow:0 0 0 3px rgba(255,140,0,.07)}
.comp-ta::placeholder{color:var(--t3)}
.comp-row{display:flex;justify-content:space-between;align-items:center;margin-top:.65rem;flex-wrap:wrap;gap:.5rem}
.cat-chip{padding:.25rem .7rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--t3);font-size:.68rem;cursor:pointer;transition:all .14s;font-family:var(--f2)}
.cat-chip.on{border-color:var(--o1);background:var(--og2);color:var(--o1)}
.char-c{font-size:.68rem;color:var(--t4)}
.char-c.warn{color:var(--red)}
.fb{font-size:.73rem}
.fb.ok{color:var(--green)}
.fb.warn{color:#F0A500}

/* FILTER */
.filters{display:flex;gap:.35rem;margin-bottom:.85rem;flex-wrap:wrap}
.fchip{display:flex;align-items:center;gap:.35rem;padding:.26rem .82rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--t3);font-size:.68rem;cursor:pointer;transition:all .14s;font-family:var(--f2);font-weight:500}
.fchip:hover{border-color:var(--border-o);color:var(--t2)}
.fchip.on{border-color:var(--o1);background:var(--og3);color:var(--o1)}
.fcnt{background:rgba(255,255,255,.04);border-radius:20px;padding:.05rem .3rem;font-size:.58rem;color:var(--t4)}

/* POST CARD */
.post{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;margin-bottom:.75rem;backdrop-filter:blur(16px);box-shadow:var(--sh);transition:border-color .15s,box-shadow .15s;animation:pIn .4s var(--ease) both}
.post:hover{border-color:var(--border-o);box-shadow:0 8px 40px rgba(255,140,0,.1)}
.post.flagged{border-color:rgba(255,59,59,.18)}
@keyframes pIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.85rem}
.pu{display:flex;gap:.65rem;align-items:center;cursor:pointer}
.pu:hover .pname{color:var(--o1)}
.pname{font-size:.9rem;font-weight:700;color:var(--t1);transition:color .14s}
.pmeta{font-size:.68rem;color:var(--t3);margin-top:1px}
.pbadges{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
.ctag{font-size:.56rem;letter-spacing:1px;padding:.13rem .46rem;border-radius:3px;font-weight:700}
.tc{color:var(--blue);border:1px solid rgba(0,153,255,.2);background:rgba(0,153,255,.06)}
.mc{color:var(--o1);border:1px solid rgba(255,140,0,.2);background:rgba(255,140,0,.06)}
.sc{color:var(--green);border:1px solid rgba(0,204,136,.2);background:rgba(0,204,136,.06)}
.vc{color:var(--red);border:1px solid rgba(255,59,59,.2);background:rgba(255,59,59,.06)}
.ftag{font-size:.52rem;color:var(--red);border:1px solid rgba(255,59,59,.2);padding:.1rem .36rem;border-radius:3px;letter-spacing:1px}
.lbtn{background:transparent;border:none;color:var(--red);font-size:.95rem;cursor:pointer;opacity:.7;transition:all .14s}
.lbtn:hover{opacity:1;transform:scale(1.15)}
.pbody{color:var(--t1);line-height:1.85;font-size:.88rem;margin-bottom:.85rem}

/* CODE BLOCK */
.code-wrap{border-radius:10px;overflow:hidden;margin:.75rem 0;border:1px solid var(--border)}
.code-hdr{background:var(--bg4);padding:.45rem .85rem;display:flex;align-items:center;justify-content:space-between}
.code-dots{display:flex;gap:.35rem}
.cd{width:8px;height:8px;border-radius:50%}
.code-lang{font-size:.54rem;letter-spacing:2px;color:var(--o3);font-weight:700}
.code-body{background:var(--bg);padding:1rem 1.1rem;font-family:var(--f3);font-size:.78rem;color:#FFB347;overflow-x:auto;line-height:1.65;white-space:pre}

/* REACTIONS */
.pactions{display:flex;border-top:1px solid var(--border);padding-top:.6rem;position:relative}
.abtn{flex:1;background:none;border:none;color:var(--t3);cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;gap:.35rem;padding:.4rem .25rem;border-radius:7px;transition:all .14s;font-family:var(--f2)}
.abtn:hover{color:var(--t1);background:var(--og3)}
.abtn.reacted{color:var(--o1)}
.abtn.shared{color:var(--green)}
.aem{font-size:.95rem;transition:transform .14s}
.abtn:hover .aem{transform:scale(1.25)}
.albl{font-size:.68rem;opacity:.7}
.acnt{font-size:.72rem}
.rpicker{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:40px;padding:.4rem .75rem;display:flex;gap:.5rem;box-shadow:0 20px 60px rgba(0,0,0,.7);backdrop-filter:blur(24px);z-index:100;white-space:nowrap;animation:picIn .2s var(--ease)}
@keyframes picIn{from{opacity:0;transform:translateX(-50%) scale(.85) translateY(4px)}to{opacity:1;transform:translateX(-50%) scale(1) translateY(0)}}
.ropt{font-size:1.5rem;cursor:pointer;border:none;background:none;padding:.2rem;border-radius:50%;transition:transform .14s}
.ropt:hover{transform:scale(1.35) translateY(-4px)}
.rsummary{display:flex;align-items:center;gap:.5rem;padding:.3rem 0}

/* COMMENTS */
.carea{margin-top:.75rem;border-top:1px solid var(--border);padding-top:.75rem}
.citem{display:flex;gap:.5rem;margin-bottom:.6rem}
.cbubble{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:.5rem .75rem}
.cauthor{color:var(--o1);font-size:.72rem;font-weight:700;margin-bottom:.2rem;cursor:pointer}
.ctext{color:var(--t2);font-size:.83rem;line-height:1.65}
.cfoot{display:flex;align-items:center;gap:.75rem;margin-top:.25rem}
.ctime{font-size:.62rem;color:var(--t4)}
.rbtn{background:none;border:none;color:var(--t4);font-size:.65rem;cursor:pointer}
.rbtn:hover{color:var(--o1)}
.delbtn{background:none;border:none;color:var(--red);font-size:.65rem;cursor:pointer;opacity:.5}
.delbtn:hover{opacity:1}
.cinput-row{display:flex;gap:.5rem;align-items:center;margin-top:.6rem}
.cinput{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:.5rem .85rem;color:var(--t1);font-size:.82rem;outline:none;transition:border-color .15s;font-family:var(--f2)}
.cinput:focus{border-color:var(--border-o)}
.cinput::placeholder{color:var(--t4)}

/* PAGINATION */
.pager{display:flex;gap:.35rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap;align-items:center}
.pg{padding:.33rem .68rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--t3);cursor:pointer;font-size:.73rem;transition:all .14s;min-width:30px;font-family:var(--f2)}
.pg:hover:not(:disabled){border-color:var(--border-o);color:var(--o1)}
.pg.cur{border-color:var(--o1);background:var(--og3);color:var(--o1)}
.pg:disabled{color:var(--t4);cursor:default;opacity:.35}

/* GALLERY */
.masonry{columns:3 260px;column-gap:.85rem}
.mitem{break-inside:avoid;margin-bottom:.85rem;border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid var(--border);transition:transform .25s,border-color .15s}
.mitem:hover{transform:scale(1.012);border-color:var(--border-o)}
.mface{position:relative}

const loadDB=()=>{
  try{const r=localStorage.getItem(DB_KEY);if(r){const p=JSON.parse(r);if(p.version===5)return p;}}catch{}
  const users=USERS.map(u=>({...u}));
  const db={version:5,users,posts:genPosts(),messages:[],notifications:genNotifs(users),stories:genStories(users)};
  localStorage.setItem(DB_KEY,JSON.stringify(db));
  return db;
};
const saveDB=db=>{try{localStorage.setItem(DB_KEY,JSON.stringify(db));}catch{}};

// ── CONTEXT ────────────────────────────────────────────────────────
const Ctx=createContext(null);
const useStore=()=>useContext(Ctx);

function StoreProvider({children}){
  const[db,setDB]=useState(null);
  const[user,setUser]=useState(null);
  const[page,setPage]=useState("feed");
  const[timeline,setTimeline]=useState(null);
  const[theme,setThemeState]=useState("dark");
  const[suspended,setSus]=useState(false);
  const[notifOpen,setNotifOpen]=useState(false);
  const[settingsOpen,setSettingsOpen]=useState(false);
  const[searchQ,setSearchQ]=useState("");
  const[reactionPicker,setReactionPicker]=useState(null);

  useEffect(()=>{
    const loaded=loadDB();
    setDB(loaded);
    const t=localStorage.getItem(TH_KEY)||"dark";
    setThemeState(t);
    document.documentElement.setAttribute("data-theme",t);
    try{
      const raw=localStorage.getItem(SES_KEY);
      if(!raw)return;
      const saved=JSON.parse(raw);
      if(saved.role==="admin"){setUser(saved);setPage("admin");return;}
      const fresh=loaded.users.find(u=>u.id===saved.id);
      if(!fresh)return;
      if(fresh.suspended){setSus(true);return;}
      setUser(fresh);
    }catch{}
  },[]);

  const updateDB=useCallback(newDB=>{
    setDB({...newDB});saveDB(newDB);
    if(user&&user.role!=="admin"){
      const f=newDB.users.find(u=>u.id===user.id);
      if(f?.suspended){setSus(true);localStorage.removeItem(SES_KEY);}
    }
  },[user]);

  const setTheme=useCallback(t=>{
    setThemeState(t);
    localStorage.setItem(TH_KEY,t);
    document.documentElement.setAttribute("data-theme",t);
  },[]);

  const login=useCallback(u=>{
    if(u.suspended){setSus(true);return;}
    localStorage.setItem(SES_KEY,JSON.stringify(u));
    setUser(u);setPage(u.role==="admin"?"admin":"feed");
  },[]);

  const logout=useCallback(()=>{
    localStorage.removeItem(SES_KEY);
    setUser(null);setSus(false);setPage("feed");setSettingsOpen(false);setNotifOpen(false);
  },[]);

  const reactToPost=useCallback((pid,emoji)=>{
    if(!db||!user)return;
    const post=db.posts.find(p=>p.id===pid);
    if(!post)return;
    if(!post.reactions)post.reactions={};
    REACTIONS.forEach(e=>{if(post.reactions[e])post.reactions[e]=post.reactions[e].filter(id=>id!==user.id);});
    if(!post.reactions[emoji])post.reactions[emoji]=[];
    const alreadyRemoved=!Object.values(post.reactions).flat().includes(user.id);
    if(alreadyRemoved)post.reactions[emoji].push(user.id);
    setReactionPicker(null);updateDB({...db});
  },[db,user,updateDB]);

  const getTR=useCallback(post=>Object.values(post.reactions||{}).reduce((a,arr)=>a+arr.length,0),[]);
  const getUserR=useCallback(post=>{if(!post.reactions||!user)return null;for(const[e,us]of Object.entries(post.reactions)){if(us.includes(user.id))return e;}return null;},[user]);

  const addComment=useCallback((pid,text,parentId=null)=>{
    if(!db||!user||!text.trim())return;
    const post=db.posts.find(p=>p.id===pid);if(!post)return;
    const c={id:`c${Date.now()}`,userId:user.id,userName:user.name,userAvatar:user.avatar,text:text.trim(),timestamp:new Date().toISOString(),replies:[]};
    if(parentId){const par=post.comments.find(x=>x.id===parentId);if(par){if(!par.replies)par.replies=[];par.replies.push(c);}}
    else post.comments.push(c);
    updateDB({...db});
  },[db,user,updateDB]);

  const deleteComment=useCallback((pid,cid)=>{
    if(!db||!user)return;
    const post=db.posts.find(p=>p.id===pid);if(!post)return;
    post.comments=post.comments.filter(c=>c.id!==cid);
    post.comments.forEach(c=>{if(c.replies)c.replies=c.replies.filter(r=>r.id!==cid);});
    updateDB({...db});
  },[db,user,updateDB]);

  const publishPost=useCallback((content,category)=>{
    if(!db||!user||!content.trim())return null;
    const viol=checkViol(content);
    db.posts.unshift({id:`p${Date.now()}`,userId:user.id,userName:user.name,userAvatar:user.avatar,
      content:content.trim(),type:"text",code:null,videoLabel:null,category,
      reactions:{},comments:[],shares:0,saves:0,views:0,
      flagged:!!viol,flagReason:viol||null,timestamp:new Date().toISOString()});
    updateDB({...db});
    return{flagged:!!viol};
  },[db,user,updateDB]);

  const sharePost=useCallback(pid=>{
    if(!db)return;
    const p=db.posts.find(x=>x.id===pid);
    if(p){p.shares=(p.shares||0)+1;updateDB({...db});}
  },[db,updateDB]);

  const sendMessage=useCallback((toId,text)=>{
    if(!db||!user||!text.trim())return;
    if(!db.messages)db.messages=[];
    db.messages.push({id:`m${Date.now()}`,from:user.id,to:toId,text:text.trim(),timestamp:new Date().toISOString()});
    updateDB({...db});
  },[db,user,updateDB]);

  const getConvo=useCallback(otherId=>(db?.messages||[]).filter(m=>(m.from===user?.id&&m.to===otherId)||(m.from===otherId&&m.to===user?.id)),[db,user]);

  const markAllRead=useCallback(()=>{if(!db)return;db.notifications.forEach(n=>n.read=true);updateDB({...db});},[db,updateDB]);
  const unreadCount=useMemo(()=>db?.notifications?.filter(n=>!n.read).length||0,[db]);

  const markStorySeen=useCallback(sid=>{
    if(!db)return;const s=db.stories?.find(x=>x.id===sid);
    if(s){s.seen=true;updateDB({...db});}
  },[db,updateDB]);

  const banUser=useCallback(uid=>{
    if(!db)return;const u=db.users.find(x=>x.id===uid);if(!u||u.suspended)return;
    u.suspended=true;
    try{const s=localStorage.getItem(SES_KEY);if(s&&JSON.parse(s).id===uid)localStorage.removeItem(SES_KEY);}catch{}
    updateDB({...db});
  },[db,updateDB]);

  const reinstateUser=useCallback(uid=>{
    if(!db)return;const u=db.users.find(x=>x.id===uid);if(u){u.suspended=false;updateDB({...db});}
  },[db,updateDB]);

  const removePost=useCallback(pid=>{
    if(!db)return;const i=db.posts.findIndex(p=>p.id===pid);
    if(i>-1){db.posts.splice(i,1);updateDB({...db});}
  },[db,updateDB]);

  const{localResults,externalResults}=useMemo(()=>{
    if(searchQ.length<2)return{localResults:[],externalResults:[]};
    const q=searchQ.toLowerCase();
    const lr=(db?.posts||[]).filter(p=>p.content.toLowerCase().includes(q)||p.userName.toLowerCase().includes(q)).slice(0,8);
    const ur=(db?.users||[]).filter(u=>u.name.toLowerCase().includes(q)).slice(0,3).map(u=>({...u,_isUser:true}));
    const er=lr.length===0?EXTERNAL.filter(r=>r.title.toLowerCase().includes(q)||r.snippet.toLowerCase().includes(q)):[];
    return{localResults:[...lr,...ur],externalResults:er};
  },[searchQ,db]);

  return(
    <Ctx.Provider value={{
      db,user,page,setPage,theme,setTheme,suspended,setSus,
      timeline,setTimeline,login,logout,updateDB,
      reactToPost,getTR,getUserR,reactionPicker,setReactionPicker,
      addComment,deleteComment,publishPost,sharePost,
      sendMessage,getConvo,
      markAllRead,unreadCount,markStorySeen,
      banUser,reinstateUser,removePost,
      notifOpen,setNotifOpen,settingsOpen,setSettingsOpen,
      searchQ,setSearchQ,localResults,externalResults,
    }}>
      {children}
    </Ctx.Provider>
  );
}

const APAL=[

function Avi({initials="?",size=36,uid="",onClick}){

// ── AUTH ────────────────────────────────────────────────────────────
function AuthScreen(){
  const{db,login}=useStore();
  const[mode,setMode]=useState("login");
  const[phone,setPhone]=useState("");
  const[pass,setPass]=useState("");
  const[name,setName]=useState("");
  const[err,setErr]=useState("");

  const doLogin=()=>{
    setErr("");
    if(phone===ADMIN_PHONE&&pass===ADMIN_PASS){
      login({id:"admin",name:"Chief Admin",phone:ADMIN_PHONE,role:"admin",avatar:"CA",suspended:false,verified:true,followers:0,following:0,bio:"Chief Administrator of Black Ink Gallery."});
      return;
    }
    const u=db?.users?.find(x=>x.phone===phone&&x.password===pass);
    if(!u){setErr("Incorrect credentials. Please check your details.");return;}
    login(u);
  };

  const doReg=()=>{
    setErr("");
    if(!name.trim()||!phone.trim()||!pass.trim()){setErr("All fields are required.");return;}
    if(db?.users?.find(x=>x.phone===phone)){setErr("Phone number already registered.");return;}
    const nu={id:`u${Date.now()}`,name:name.trim(),phone,password:pass,
      avatar:name.trim().split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2),
      bio:"Black Ink Gallery member.",role:"user",suspended:false,
      verified:false,followers:0,following:0,joined:new Date().toLocaleDateString("en-GB",{month:"short",year:"numeric"})};
    if(db)db.users.push(nu);
    login(nu);
  };

  return(
    <div className="auth-wrap">
      <div className="auth-orb"/>
      <div className="auth-card">
        <div style={{textAlign:"center",marginBottom:"2rem"}}>
          <div className="auth-wm">BLACK INK</div>
          <div className="auth-sub">GALLERY</div>
          <div className="auth-rule"/>
        </div>
        <div className="auth-lbl">{mode==="login"?"MEMBER ACCESS":"CREATE MEMBERSHIP"}</div>
        {mode==="register"&&<input className="field" placeholder="Full Name" value={name} onChange={e=>setName(e.target.value)}/>}
        <input className="field" placeholder="Phone Number" value={phone} onChange={e=>setPhone(e.target.value)}/>
        <input className="field" type="password" placeholder="Password" value={pass} style={{marginBottom:0}}
          onChange={e=>setPass(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&(mode==="login"?doLogin():doReg())}/>
        {err&&<div className="auth-err" style={{marginTop:".75rem"}}>{err}</div>}
        <div style={{display:"flex",flexDirection:"column",gap:".6rem",marginTop:"1.25rem"}}>
          <button className="btn btn-p btn-fw" onClick={mode==="login"?doLogin:doReg}>
            {mode==="login"?"ENTER THE GALLERY":"JOIN BLACK INK"}
          </button>
          <button className="btn btn-g btn-fw" onClick={()=>{setMode(mode==="login"?"register":"login");setErr("");}}>
            {mode==="login"?"New Member? Register":"Already a member? Login"}
          </button>
        </div>
        <div style={{textAlign:"center",marginTop:"2rem",fontSize:".54rem",color:"var(--t4)",letterSpacing:2}}>© 2025 BLACK INK GALLERY</div>
      </div>
    </div>
  );
}

// ── CODE BLOCK ──────────────────────────────────────────────────────
function CodeBlock({code}){
  const[copied,setCopied]=useState(false);
  const copy=()=>{navigator.clipboard?.writeText(code).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});};
  return(
    <div className="code-wrap">
      <div className="code-hdr">
        <div className="code-dots">
          <div className="cd" style={{background:"#ff5f56"}}/>
          <div className="cd" style={{background:"#ffbd2e"}}/>
          <div className="cd" style={{background:"#27c93f"}}/>
        </div>
        <span className="code-lang">CODE SNIPPET</span>
        <button className="btn btn-g btn-sm" onClick={copy}>{copied?"✓ Copied":"Copy"}</button>
      </div>
      <pre className="code-body">{code}</pre>
    </div>
  );
}

// ── COMMENT ITEM ────────────────────────────────────────────────────
function CItem({comment,postId,depth=0}){
  const{user,addComment,deleteComment}=useStore();
  const[open,setOpen]=useState(false);
  const[txt,setTxt]=useState("");
  const doReply=()=>{if(!txt.trim())return;addComment(postId,txt,comment.id);setTxt("");setOpen(false);};
  return(
    <div className="citem" style={{marginLeft:depth>0?"1.5rem":0}}>
      <Avi initials={comment.userAvatar||comment.userName.slice(0,2).toUpperCase()} size={26} uid={comment.userId||""}/>
      <div style={{flex:1}}>
        <div className="cbubble">
          <div className="cauthor">{comment.userName}</div>
          <div className="ctext">{comment.text}</div>
        </div>
        <div className="cfoot">
          <span className="ctime">{timeAgo(comment.timestamp)}</span>
          {depth<2&&<button className="rbtn" onClick={()=>setOpen(!open)}>↩ Reply</button>}
          {comment.userId===user?.id&&<button className="delbtn" onClick={()=>deleteComment(postId,comment.id)}>🗑</button>}
        </div>
        {open&&(
          <div className="cinput-row" style={{marginTop:".35rem"}}>
            <input autoFocus className="cinput" value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doReply()} placeholder={`Reply to ${comment.userName}…`}/>
            <button className="btn btn-p btn-sm" onClick={doReply}>Reply</button>
          </div>
        )}
        {comment.replies?.map(r=><CItem key={r.id} comment={r} postId={postId} depth={depth+1}/>)}
      </div>
    </div>
  );
}

// ── POST CARD ───────────────────────────────────────────────────────
function Post({post,adminMode=false}){
  const{user,reactToPost,getTR,getUserR,sharePost,addComment,setReactionPicker,reactionPicker,banUser,removePost,setPage,setTimeline}=useStore();
  const[showC,setShowC]=useState(false);
  const[cTxt,setCTxt]=useState("");
  const[shared,setShared]=useState(false);
  const myR=getUserR(post);
  const totalR=getTR(post);
  const catCls={
    "Tech/Code":"tc","Marketplace":"mc","Social":"sc","Video":"vc"
  }[post.category]||"sc";

  const handleShare=()=>{sharePost(post.id);setShared(true);setTimeout(()=>setShared(false),2000);};
  const handleC=()=>{if(!cTxt.trim())return;addComment(post.id,cTxt);setCTxt("");};

  const rSummary=Object.entries(post.reactions||{}).filter(([,a])=>a.length>0).map(([e,a])=>({e,c:a.length}));

  return(
    <article className={`post${post.flagged?" flagged":""}`}>
      <div className="ph">
        <div className="pu" onClick={()=>{setTimeline(post.userId);setPage("timeline");}}>
          <Avi initials={post.userAvatar} size={38} uid={post.userId}/>
          <div>
            <div className="pname">{post.userName}</div>
            <div className="pmeta">{timeAgo(post.timestamp)}</div>
          </div>
        </div>
        <div className="pbadges">
          {post.flagged&&<span className="ftag">FLAGGED</span>}
          <span className={`ctag ${catCls}`}>{post.category}</span>
          {adminMode&&<button className="lbtn" title={`Suspend ${post.userName}`} onClick={()=>{if(window.confirm(`Suspend ${post.userName}?`))banUser(post.userId);}}>🔒</button>}
        </div>
      </div>
      <div className="pbody">{post.content}</div>
      {post.code&&<CodeBlock code={post.code}/>}
      {post.type==="video"&&(
        <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:10,margin:".75rem 0",overflow:"hidden"}}>
          <div style={{height:180,background:"linear-gradient(135deg,#1a0c00,#050505)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:".75rem",cursor:"pointer"}}>
            <div style={{width:52,height:52,borderRadius:"50%",background:"var(--og1)",border:"2px solid var(--o1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.3rem"}}>▶</div>
            <span style={{fontSize:".68rem",letterSpacing:1.5,color:"var(--o3)",fontWeight:600}}>{post.videoLabel||"VIDEO"}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",padding:".5rem .85rem",borderTop:"1px solid var(--border)"}}>
            <span style={{fontSize:".68rem",color:"var(--t3)"}}>👁 {post.views?.toLocaleString()||0} views</span>
            <span style={{fontSize:".68rem",color:"var(--t3)"}}>{post.videoLabel}</span>
          </div>
        </div>
      )}
      {rSummary.length>0&&(
        <div className="rsummary">
          <div>{rSummary.slice(0,4).map(r=><span key={r.e} style={{fontSize:".8rem"}}>{r.e}</span>)}</div>
          <span style={{fontSize:".72rem",color:"var(--t3)"}}>{totalR} reaction{totalR!==1?"s":""}</span>
        </div>
      )}
      <div className="pactions">
        {reactionPicker===post.id&&(
          <>
            <div style={{position:"fixed",inset:0,zIndex:89}} onClick={()=>setReactionPicker(null)}/>
            <div className="rpicker">
              {REACTIONS.map((em,i)=>(
                <button key={em} className="ropt" title={RLABELS[i]} onClick={()=>reactToPost(post.id,em)}>{em}</button>
              ))}
            </div>
          </>
        )}
        <button className={`abtn${myR?" reacted":""}`} onClick={()=>setReactionPicker(reactionPicker===post.id?null:post.id)}>
          <span className="aem">{myR||"👍"}</span>
          <span className="albl">{myR?"Reacted":"React"}</span>
          <span className="acnt">{totalR||""}</span>
        </button>
        <button className="abtn" onClick={()=>setShowC(!showC)}>
          <span className="aem">💬</span>
          <span className="albl">Critique</span>
          <span className="acnt">{post.comments?.length||0}</span>
        </button>
        <button className={`abtn${shared?" shared":""}`} onClick={handleShare}>
          <span className="aem">{shared?"✅":"↗"}</span>
          <span className="albl">{shared?"Spread!":"Spread"}</span>
          <span className="acnt">{post.shares||0}</span>
        </button>
        {adminMode&&(
          <button className="abtn" style={{color:"var(--red)"}} onClick={()=>{if(window.confirm("Remove post?"))removePost(post.id);}}>
            <span>🗑</span><span className="albl">Remove</span>
          </button>
        )}
      </div>
      {showC&&(
        <div className="carea">
          {post.comments?.map(c=><CItem key={c.id} comment={c} postId={post.id}/>)}
          <div className="cinput-row">
            <Avi initials={user.avatar} size={26} uid={user.id}/>
            <input className="cinput" value={cTxt} onChange={e=>setCTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleC()} placeholder="Write a critique…"/>

        </div>

// ── COMPOSER ────────────────────────────────────────────────────────
function Composer(){
  const{user,publishPost}=useStore();
  const[content,setContent]=useState("");
  const[cat,setCat]=useState("Social");
  const[fb,setFb]=useState(null);
  const submit=()=>{
    if(!content.trim()||content.length>2000)return;
    const r=publishPost(content,cat);
    setContent("");
    setFb(r?.flagged?{msg:"Published — flagged for review.",cls:"warn"}:{msg:"Published successfully ✓",cls:"ok"});
    setTimeout(()=>setFb(null),3500);
  };
  return(
    <div className="composer">
      <div style={{display:"flex",gap:".65rem",alignItems:"flex-start"}}>
        <Avi initials={user.avatar} size={38} uid={user.id}/>
        <textarea className="comp-ta" value={content} onChange={e=>setContent(e.target.value)}
          placeholder="Share something with the Black Ink community…"
          onFocus={e=>e.target.style.borderColor="var(--border-o)"}
          onBlur={e=>e.target.style.borderColor="var(--border)"}/>
      </div>
      <div className="comp-row">
        <div style={{display:"flex",gap:".35rem"}}>
          {CATS.map(c=><button key={c} className={`cat-chip${cat===c?" on":""}`} onClick={()=>setCat(c)}>{c}</button>)}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:".75rem"}}>
          {fb&&<span className={`fb ${fb.cls}`}>{fb.msg}</span>}
          <span className={`char-c${content.length>1800?" warn":""}`}>{content.length}/2000</span>
          <button className="btn btn-p btn-sm" onClick={submit} disabled={!content.trim()||content.length>2000} style={{opacity:!content.trim()?.45:1}}>PUBLISH</button>
        </div>
      </div>
    </div>
  );
}

function FeedPage(){
  const{db}=useStore();
  const[filter,setFilter]=useState("All");
  const[pg,setPg]=useState(0);
  const PER=15;
  const all=filter==="All"?db.posts:db.posts.filter(p=>p.category===filter);
  const slice=all.slice(pg*PER,(pg+1)*PER);
  const total=Math.ceil(all.length/PER);
  const counts=["All",...CATS].reduce((a,c)=>{a[c]=c==="All"?db.posts.length:db.posts.filter(p=>p.category===c).length;return a;},{});
  return(
    <div>
      <StoriesBar/>
      <Composer/>
      <div className="filters">
        {["All",...CATS].map(f=>(
          <button key={f} className={`fchip${filter===f?" on":""}`} onClick={()=>{setFilter(f);setPg(0);}}>
            {f}<span className="fcnt">{counts[f]}</span>
          </button>
        ))}
      </div>
      {slice.map(p=><Post key={p.id} post={p}/>)}
      {total>1&&(
        <div className="pager">
          <button className="pg" onClick={()=>setPg(Math.max(0,pg-1))} disabled={pg===0}>←</button>
          {Array.from({length:Math.min(total,10)},(_,i)=>(
            <button key={i} className={`pg${pg===i?" cur":""}`} onClick={()=>setPg(i)}>{i+1}</button>
          ))}
          {total>10&&<span style={{color:"var(--t4)",fontSize:".72rem"}}>…{total}</span>}
          <button className="pg" onClick={()=>setPg(Math.min(total-1,pg+1))} disabled={pg>=total-1}>→</button>
        </div>
      )}
    </div>
  );
}

  return(
    <div className="inbox-wrap">
      <div className="inbox-list">
        <div className="inbox-hdr">CONVERSATIONS</div>
        <div className="contacts">
          {contacts.map(c=>(
            <div key={c.id} className={`contact${sel?.id===c.id?" on":""}`} onClick={()=>setSel(c)}>
              <Avi initials={c.avatar} size={34} uid={c.id}/>
              <div style={{flex:1,overflow:"hidden"}}>
                <div className="cname">{c.name}</div>
                <div className="cprev">{c.bio?.slice(0,28)||"Click to message"}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div className="chat-pane">
        {sel?(
          <>
            <div className="chat-hdr">
              <Avi initials={sel.avatar} size={34} uid={sel.id}/>
              <div>
                <div className="chat-nm">{sel.name}{sel.verified&&<span style={{color:"var(--o1)",marginLeft:3}}>✓</span>}</div>
                <div className="chat-online">● Active now</div>
              </div>
            </div>
            <div className="chat-msgs" ref={msgsRef}>
              {convo.length===0&&<div className="chat-empty">Start the conversation.</div>}
              {convo.map(m=>(
                <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:m.from===user.id?"flex-end":"flex-start"}}>
                  <div className={`msg ${m.from===user.id?"s":"r"}`}>{m.text}</div>
                  <span className="msg-time">{timeAgo(m.timestamp)}</span>
                </div>
              ))}
            </div>
            <div className="chat-input-row">
              <input className="chat-inp" value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder={`Message ${sel.name}…`}/>
              <button className="btn btn-p btn-sm" onClick={send}>SEND</button>
            </div>
          </>
        ):(
          <div className="chat-empty">Select a contact to begin messaging.</div>
        )}
      </div>
    </div>
  );
}

// ── TIMELINE PAGE ────────────────────────────────────────────────────
function TimelinePage(){
  const{db,timeline,setPage,user:cu,banUser}=useStore();
  const subject=db?.users?.find(u=>u.id===timeline);
  const userPosts=db?.posts?.filter(p=>p.userId===timeline)||[];
  const isAdmin=cu?.role==="admin";
  if(!subject)return(<div><button className="back-btn" onClick={()=>setPage("feed")}>← Back</button><div className="empty">User not found.</div></div>);
  const tr=userPosts.reduce((a,p)=>a+Object.values(p.reactions||{}).flat().length,0);
  return(
    <div>
      <button className="back-btn" onClick={()=>setPage("feed")}>← Back to Feed</button>
      <div className="scard" style={{padding:0,overflow:"hidden",marginBottom:"1rem"}}>
        <div className="tl-banner"/>
        <div className="tl-body">
          <div className="tl-avi"><Avi initials={subject.avatar} size={72} uid={subject.id}/></div>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:"1rem"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:".5rem"}}>
                <span className="tl-name">{subject.name}</span>
                {subject.verified&&<span style={{color:"var(--o1)",fontSize:"1rem"}}>✓</span>}
              </div>
              <div className="tl-bio">{subject.bio}</div>
            </div>
            <div style={{display:"flex",gap:".5rem"}}>
              {isAdmin&&!subject.suspended&&(
                <button className="btn btn-d" onClick={()=>{if(window.confirm(`Suspend ${subject.name}?`))banUser(subject.id);}}>🔒 Suspend</button>
              )}
              <button className="btn btn-p btn-sm">Follow</button>
            </div>
          </div>
          <div className="tl-stats">
            <div><div className="ts-v">{userPosts.length}</div><div className="ts-l">POSTS</div></div>
            <div><div className="ts-v">{tr}</div><div className="ts-l">REACTIONS</div></div>
            <div><div className="ts-v">{subject.followers?.toLocaleString()}</div><div className="ts-l">FOLLOWERS</div></div>
            <div><div className="ts-v">{subject.following}</div><div className="ts-l">FOLLOWING</div></div>
          </div>
          <div style={{marginTop:".5rem",fontSize:".7rem",color:"var(--t4)"}}>Joined {subject.joined}</div>
        </div>
      </div>
      <div style={{fontSize:".6rem",letterSpacing:3,color:"var(--t4)",marginBottom:"1rem",fontWeight:700}}>POSTS ({userPosts.length})</div>
      {userPosts.length===0&&<div className="empty">No posts yet.</div>}
      {userPosts.map(p=><Post key={p.id} post={p} adminMode={isAdmin}/>)}
    </div>
  );
}

// ── ADMIN PANEL ──────────────────────────────────────────────────────
function AdminPanel(){
  const{db,banUser,reinstateUser,removePost}=useStore();
  const[tab,setTab]=useState("flagged");
  const flagged=db?.posts?.filter(p=>p.flagged)||[];
  const suspended=db?.users?.filter(u=>u.suspended)||[];
  const stats=[
    {v:db?.posts?.length||0,l:"Total Posts",c:"var(--o1)"},
    {v:flagged.length,l:"Flagged",c:"var(--red)"},
    {v:db?.users?.length||0,l:"Members",c:"var(--o3)"},
    {v:suspended.length,l:"Suspended",c:"var(--red)"},
    {v:db?.messages?.length||0,l:"Messages",c:"var(--blue)"},
  ];
  return(
    <div>
      <div className="admin-hd-row">
        <span style={{fontSize:"2rem"}}>⚡</span>
        <div>
          <div className="admin-title">GOD-MODE ADMIN</div>
          <div className="admin-sub">CHIEF ADMINISTRATOR — FULL SYSTEM CONTROL</div>
        </div>
      </div>
      <div className="stats-grid">
        {stats.map(s=>(
          <div key={s.l} className="stat-box" style={{borderColor:`${s.c}20`}}>
            <div className="stat-val" style={{color:s.c}}>{s.v.toLocaleString()}</div>
            <div className="stat-lbl">{s.l}</div>
          </div>
        ))}
      </div>
      <div className="atabs">
        {[["flagged","🚩 Flagged Posts"],["users","👥 All Members"],["suspended","🔒 Suspended"]].map(([id,lbl])=>(
          <button key={id} className={`atab${tab===id?" on":""}`} onClick={()=>setTab(id)}>{lbl}</button>
        ))}
      </div>
      {tab==="flagged"&&(
        <div>
          {flagged.length===0&&<div className="empty">No flagged content.</div>}
          {flagged.map(post=>(
            <div key={post.id} className="fcard">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:".5rem",marginBottom:".65rem"}}>
                <div>
                  <div className="flbl">⚠ COMMUNITY VIOLATION DETECTED</div>
                  <div className="fuser">{post.userName}</div>
                  <div className="fkw">Keyword: "{post.flagReason}" · {timeAgo(post.timestamp)}</div>
                </div>
                <div style={{display:"flex",gap:".4rem"}}>
                  <button className="btn btn-d btn-sm" onClick={()=>{if(window.confirm(`Suspend ${post.userName}?`))banUser(post.userId);}}>🔒 Ban User</button>
                  <button className="btn btn-g btn-sm" onClick={()=>{if(window.confirm("Remove post?"))removePost(post.id);}}>Remove</button>
                </div>
              </div>
              <div className="fquote">{post.content}</div>
            </div>
          ))}
        </div>
      )}
      {tab==="users"&&(
        <div>
          {db?.users?.map(u=>(
            <div key={u.id} className={`urow${u.suspended?" sus":""}`}>
              <div style={{display:"flex",gap:".65rem",alignItems:"center",flexWrap:"wrap"}}>
                <Avi initials={u.avatar} size={36} uid={u.id}/>
                <div>
                  <div className="unm">{u.name}{u.verified&&<span style={{color:"var(--o1)",marginLeft:3}}>✓</span>}</div>
                  <div className="uph">{u.phone} · {u.role}</div>
                </div>
                {u.suspended&&<span className="sus-badge">SUSPENDED</span>}
              </div>
              {!u.suspended
                ?<button className="btn btn-d btn-sm" onClick={()=>{if(window.confirm(`Suspend ${u.name}?`))banUser(u.id);}}>🔒 Suspend</button>
                :<button className="btn btn-g btn-sm" onClick={()=>reinstateUser(u.id)}>Reinstate</button>
              }
            </div>
          ))}
        </div>
      )}
      {tab==="suspended"&&(
        <div>
          {suspended.length===0&&<div className="empty">No suspended accounts.</div>}
          {suspended.map(u=>(
            <div key={u.id} className="urow sus">
              <div style={{display:"flex",gap:".65rem",alignItems:"center"}}>
                <Avi initials={u.avatar} size={36} uid={u.id}/>
                <div><div className="unm" style={{color:"var(--t3)"}}>{u.name}</div><div className="uph">{u.phone}</div></div>
              </div>
              <button className="btn btn-g btn-sm" onClick={()=>reinstateUser(u.id)}>Reinstate</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── PAGE ROUTER ──────────────────────────────────────────────────────
function PageContent(){
  const{page,user}=useStore();
  if(page==="admin"&&user.role==="admin")return<AdminPanel/>;
  if(page==="timeline")return<TimelinePage/>;
  if(page==="watch")return<WatchPage/>;
  if(page==="gallery")return<GalleryPage/>;
  if(page==="market")return<MarketPage/>;
  if(page==="messages")return<MessagesPage/>;
  return<FeedPage/>;
}

// ── APP ──────────────────────────────────────────────────────────────
function AppInner(){
  const{db,user,suspended}=useStore();
  const[settings,setSettings]=useState(false);
  if(suspended)return<SuspendedScreen/>;
  if(!db)return<div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--t4)",letterSpacing:4,fontSize:".72rem"}}>INITIALIZING…</div>;
  if(!user)return<AuthScreen/>;
  return(
    <>
      <Navbar onSettings={()=>setSettings(true)}/>
      <div className="layout">
        <SidebarLeft/>
        <main><PageContent/></main>
        <SidebarRight/>
      </div>
      {settings&&<Settings onClose={()=>setSettings(false)}/>}
    </>
  );
}

function App(){
  return(
    <StoreProvider>
      <AppInner/>
    </StoreProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
